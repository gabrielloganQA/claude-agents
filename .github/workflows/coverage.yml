name: Coverage — cobertura de testes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: |
          npm install
          npm --prefix sample-app install
          npm install --no-save c8

      - name: Start dev server com NODE_V8_COVERAGE
        run: |
          # NODE_V8_COVERAGE faz o V8 escrever coverage do servidor em disco,
          # permitindo medirmos código que roda no processo separado do Next.
          mkdir -p /tmp/dev-logs coverage-tmp
          NODE_V8_COVERAGE=$(pwd)/coverage-tmp \
            nohup setsid npm --prefix sample-app run dev > /tmp/dev-logs/server.log 2>&1 < /dev/null &
          npx wait-on http://localhost:3000 -t 60000
          curl -sf http://localhost:3000/api/todos > /dev/null && echo "✓ dev vivo"

      - name: Confirma que dev server sobreviveu
        run: |
          curl -sf http://localhost:3000/api/todos > /dev/null && echo "✓ dev ainda vivo" || (echo "✗ dev morreu" && tail -50 /tmp/dev-logs/server.log && exit 1)

      - name: Run API tests
        id: tests
        run: node --test --test-concurrency=1 tests/api/*.test.js
        continue-on-error: true

      - name: Termina dev server pra flush do coverage
        if: always()
        run: |
          pkill -TERM -f "next dev" 2>/dev/null || true
          sleep 3
          ls -la coverage-tmp/ | head -10 || true

      - name: Gera relatório de coverage
        if: always()
        run: |
          npx c8 report \
            --temp-directory=coverage-tmp \
            --reporter=json-summary \
            --reporter=text \
            --reporter=lcov \
            --include='sample-app/app/**' \
            --exclude='**/node_modules/**' \
            --exclude='**/*.test.js' \
            --exclude='**/*.spec.js' \
            --report-dir=coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Falhar workflow se testes falharam
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Post coverage summary as PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        continue-on-error: true
        run: |
          set -e
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "coverage-summary.json não encontrado — nada a comentar"
            exit 0
          fi
          # gera o BODY num arquivo via python (sem heredoc inline pra evitar indent issues)
          python3 > /tmp/comment.md <<'PYEOF'
          import json
          with open('coverage/coverage-summary.json') as f:
              d = json.load(f)
          t = d['total']
          print('## 📊 Cobertura de testes')
          print('')
          print('| Métrica | % | Coberto / Total |')
          print('| --- | --- | --- |')
          for k in ['statements','branches','functions','lines']:
              m = t[k]
              pct = m['pct']
              emoji = '✅' if pct >= 80 else ('⚠️' if pct >= 60 else '❌')
              print(f'| {k.capitalize()} | {emoji} {pct}% | {m["covered"]} / {m["total"]} |')
          print('')
          print('_Relatório detalhado nos artifacts do workflow._')
          PYEOF
          gh pr comment "$PR" --body-file /tmp/comment.md || echo "falha ao comentar (ok, segue)"
