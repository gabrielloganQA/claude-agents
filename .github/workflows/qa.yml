name: QA — testes contínuos

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            sample-app/package-lock.json

      - name: Install root deps
        run: npm install

      - name: Install sample-app deps
        run: npm --prefix sample-app install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build sample-app
        run: npm --prefix sample-app run build

      - name: Start dev server (detached)
        run: |
          # nohup + setsid mantém o processo vivo após o step terminar.
          # GitHub Actions envia SIGHUP entre steps para processos filhos da shell.
          mkdir -p /tmp/dev-logs
          nohup setsid npm --prefix sample-app run dev > /tmp/dev-logs/server.log 2>&1 < /dev/null &
          npx wait-on http://localhost:3000 -t 60000
          curl -sf http://localhost:3000/api/todos > /dev/null && echo "✓ dev vivo"

      - name: Confirma que dev server sobreviveu ao step
        run: |
          curl -sf http://localhost:3000/api/todos > /dev/null && echo "✓ dev ainda vivo" || (echo "✗ dev morreu" && tail -50 /tmp/dev-logs/server.log && exit 1)

      - name: Run API tests
        id: api
        run: npm run test:api
        continue-on-error: true

      - name: Run web tests
        id: web
        run: npm run test:web
        continue-on-error: true

      - name: Debug — emite anotações com outcomes e logs
        if: always()
        run: |
          esc() { sed -e 's/%/%25/g' -e ':a' -e 'N' -e '$!ba' -e 's/\n/%0A/g' -e 's/\r/%0D/g'; }
          echo "::notice title=outcomes::API=${{ steps.api.outcome }} Web=${{ steps.web.outcome }}"
          DEV_LOG=$(tail -40 /tmp/dev-logs/server.log 2>/dev/null | head -c 2000 | esc)
          echo "::notice title=dev_server_tail::$DEV_LOG"
          for f in $(find test-results -type f -name "*.md" 2>/dev/null | head -3); do
            CONTENT=$(head -c 1500 "$f" | esc)
            echo "::error file=$f,title=playwright_failure::$CONTENT"
          done
          echo "=== sanity ==="
          curl -s http://localhost:3000/api/todos || echo "dev down"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Garantir labels necessários
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # idempotente — não falha se já existir
          gh label create "qa-ci" --color "d73a4a" --description "Aberto pelo workflow CI" 2>/dev/null || true
          gh label create "qa-found" --color "d73a4a" --description "Aberto pelo agente qa-tester" 2>/dev/null || true
          gh label create "qa-nightly" --color "d73a4a" --description "Aberto pela varredura noturna" 2>/dev/null || true
          gh label create "security" --color "b60205" --description "Achado de segurança" 2>/dev/null || true
          gh label create "auto-update" --color "0e8a16" --description "PR/issue de atualização automática" 2>/dev/null || true
          gh label create "major-upgrade" --color "fbca04" --description "Bump major de dependência" 2>/dev/null || true
          gh label create "sample-app" --color "c5def5" --description "Mudança no app de exemplo" 2>/dev/null || true
          gh label create "docs" --color "1d76db" --description "Mudança de documentação" 2>/dev/null || true

      - name: Open issue on failure (push only)
        if: (failure() || steps.api.outcome == 'failure' || steps.web.outcome == 'failure') && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          TITLE="[QA-CI] Suite falhou em $(echo $SHA | cut -c1-7) ($(date -u +%Y-%m-%d))"
          BODY=$(cat <<EOF
          ## Resumo
          A suite de testes falhou no commit \`$SHA\` da branch \`$REF\`.

          ## Detalhes
          - Workflow: [run #$RUN](https://github.com/$REPO/actions/runs/$RUN)
          - API: \`${{ steps.api.outcome }}\`
          - Web: \`${{ steps.web.outcome }}\`

          ## Próximos passos
          Um membro do time pode rodar \`/dev-fix\` no Claude Code para investigar.

          _Aberta automaticamente pelo workflow \`qa.yml\`._
          EOF
          )
          # Evita duplicata recente para o mesmo SHA
          if gh issue list --label "bug,qa-ci" --search "$SHA in:title" --state open --json number --jq "length" | grep -q "^0$"; then
            gh issue create --title "$TITLE" --label "bug,qa-ci" --body "$BODY"
          else
            echo "Issue para $SHA já existe — não duplicando."
          fi

      - name: Falhar workflow se algum teste falhou
        if: steps.api.outcome == 'failure' || steps.web.outcome == 'failure'
        run: exit 1
