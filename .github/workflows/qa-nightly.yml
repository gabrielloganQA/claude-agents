name: QA — varredura noturna

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC = 03:00 BRT
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  full-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            sample-app/package-lock.json

      - name: Install all
        run: npm run install:all

      - name: Build sample-app
        run: npm --prefix sample-app run build

      - name: Start dev server (detached)
        run: |
          mkdir -p /tmp/dev-logs
          nohup setsid npm --prefix sample-app run dev > /tmp/dev-logs/server.log 2>&1 < /dev/null &
          npx wait-on http://localhost:3000 -t 60000
          curl -sf http://localhost:3000/api/todos > /dev/null && echo "✓ dev vivo"

      - name: Confirma que dev server sobreviveu
        run: |
          curl -sf http://localhost:3000/api/todos > /dev/null && echo "✓ dev ainda vivo" || (echo "✗ dev morreu" && tail -50 /tmp/dev-logs/server.log && exit 1)

      - name: Run full suite
        id: suite
        run: npm run test:all
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-nightly-report
          path: playwright-report/
          retention-days: 30

      - name: Garantir labels necessários
        if: steps.suite.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "qa-nightly" --color "d73a4a" --description "Aberto pela varredura noturna" 2>/dev/null || true

      - name: Open issue se suite noturna falhou
        if: steps.suite.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN: ${{ github.run_id }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TITLE="[QA-noturno] Suite falhou em $DATE"

          # Dedup: se já existe issue qa-nightly aberta há <7 dias, só comenta o run novo.
          EXISTING=$(gh issue list --label "bug,qa-nightly" --state open --json number,createdAt --jq \
            '[.[] | select((now - (.createdAt | fromdateiso8601)) < 604800)] | .[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Já existe issue #$EXISTING aberta há <7d. Adicionando comentário."
            gh issue comment "$EXISTING" --body "Falhou novamente — run: https://github.com/$REPO/actions/runs/$RUN ($DATE)"
            exit 0
          fi

          BODY=$(cat <<EOF
          A varredura noturna detectou falha na suite sem mudanças recentes no código —
          provavelmente uma regressão de dependência, ambiente, ou flakiness.

          - Run: https://github.com/$REPO/actions/runs/$RUN
          - Investigar antes de abrir trabalho do dia.
          - Se o teste falhar intermitentemente sem mudança no código, marcar com label \`flaky\` (ver CLAUDE.md §9).

          _Aberta automaticamente pelo workflow \`qa-nightly.yml\`._
          EOF
          )
          gh issue create --title "$TITLE" --label "bug,qa-nightly" --body "$BODY"

      - name: Notificar Teams se varredura noturna falhou
        if: steps.suite.outcome == 'failure'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          ./scripts/notify-teams.sh \
            --title "QA noturno falhou — ${{ github.repository }}" \
            --color "attention" \
            --message "A varredura noturna detectou falha sem mudanças recentes no código. Pode ser regressão de dependência, ambiente ou flakiness." \
            --fact "Data=$(date -u +%Y-%m-%d)" \
            --link "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --link-text "Ver run noturno"

      - name: Falhar workflow se suite falhou
        if: steps.suite.outcome == 'failure'
        run: exit 1
