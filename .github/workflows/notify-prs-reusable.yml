name: Notify Teams (PRs) — reusable

# Reusable workflow. Uso no caller:
#
#   on:
#     pull_request:
#       types: [opened, ready_for_review]
#   jobs:
#     notify:
#       uses: Atlante-TI/claude-agents/.github/workflows/notify-prs-reusable.yml@v1
#       secrets:
#         TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

on:
  workflow_call:
    secrets:
      TEAMS_WEBHOOK_URL:
        description: 'Webhook do Teams. Sem ele eh no-op.'
        required: false

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    # Drafts nao notificam
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout framework
        uses: actions/checkout@v6
        with:
          repository: Atlante-TI/claude-agents
          ref: ${{ github.action_ref || 'main' }}
          path: _framework

      - name: Classificar PR
        id: classify
        env:
          IS_BOT: ${{ github.event.pull_request.user.type }}
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          KIND="PR"
          COLOR="accent"
          if [ "$IS_BOT" = "Bot" ]; then
            KIND="PR (bot)"
          fi
          if echo "$LABELS" | grep -q '"auto-update"'; then
            KIND="Dependabot"
          fi
          if echo "$LABELS" | grep -q '"security"'; then
            KIND="PR de segurança"
            COLOR="attention"
          fi
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

      - name: Postar no Teams
        uses: ./_framework/.github/actions/notify-teams
        with:
          webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: "[${{ steps.classify.outputs.kind }}] #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
          color: ${{ steps.classify.outputs.color }}
          message: "PR em `${{ github.repository }}` aguardando revisão de CODEOWNERS."
          facts: "Autor=${{ github.event.pull_request.user.login }};Base=${{ github.event.pull_request.base.ref }};Head=${{ github.event.pull_request.head.ref }};Mudanças=+${{ github.event.pull_request.additions }} -${{ github.event.pull_request.deletions }}"
          link: ${{ github.event.pull_request.html_url }}
          link-text: Revisar PR
